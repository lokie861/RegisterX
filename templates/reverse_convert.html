{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/convert.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.min.css') }}">

<section class="converter">

  <!-- INPUT SECTION -->
  <div class="input-section">
    <h2>Reverse Converter</h2>
    <form id="reverseConvertForm">

      <!-- PLC Manufacturer -->
      <label for="plcMake"><i class="fas fa-industry"></i> PLC Manufacturer</label>
      <select id="plcMake" name="plcMake">
        {% for make in plc_make %}
        <option value="{{ make }}" {% if make == "Delta" %}selected{% endif %}>{{ make }}</option>
        {% endfor %}
      </select>

      <!-- PLC Model -->
      <label for="plcModel"><i class="fas fa-microchip"></i> PLC Model</label>
      <select id="plcModel" name="plcModel">
        <option value="">-- Select Model --</option>
      </select>

      <!-- Modbus Address -->
      <label for="modbusAddress"><i class="fas fa-hashtag"></i> Modbus Address</label>
      <input type="text" id="modbusAddress" name="modbusAddress"
             placeholder="e.g. 2148, 04196, 24591" required>

      <!-- Register Type -->
      <label for="regType"><i class="fas fa-layer-group"></i> Register Type</label>
      <select id="regType" name="regType">
        <option value="">All</option>
        <option value="bit">Bit</option>
        <option value="word">Word</option>
      </select>

      <button type="submit" class="btn-primary">
        <i class="fas fa-sync-alt"></i> Convert
      </button>
    </form>
  </div>

  <!-- OUTPUT SECTION -->
  <div class="output-section">
    <h2>Result</h2>

    <div class="output-box">

      <!-- Results -->
      <div id="resultsSection" style="display:none;">
        <div id="resultsContent"></div>
      </div>

      <!-- Errors -->
      <div id="errorSection" style="display:none;">
        <div class="output-item">
          <label>Error</label>
          <div class="output-value text-danger" id="errorMessage"></div>
        </div>
      </div>

    </div>
  </div>

</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const plcMappings = {{ plc_mappings | tojson }};
    const plcMakeSelect = document.getElementById('plcMake');
    const plcModelSelect = document.getElementById('plcModel');
    const form = document.getElementById('reverseConvertForm');
    const resultsSection = document.getElementById('resultsSection');
    const errorSection = document.getElementById('errorSection');
    const resultsContent = document.getElementById('resultsContent');
    const errorMessage = document.getElementById('errorMessage');

    plcMakeSelect.addEventListener('change', function() {
        plcModelSelect.innerHTML = '<option value="">-- Select Model --</option>';
        if (plcMappings[this.value]) {
            plcMappings[this.value].forEach(model => {
                const opt = document.createElement('option');
                opt.value = model;
                opt.textContent = model;
                plcModelSelect.appendChild(opt);
            });
        }
    });

    plcMakeSelect.dispatchEvent(new Event('change'));

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const make = plcMakeSelect.value;
        const model = plcModelSelect.value;
        const address = document.getElementById('modbusAddress').value.trim();
        const regType = document.getElementById('regType').value;

        if (!model) return showError('Please select a PLC model');

        let url = `/reverse-convert/api/reverse-convert?make=${make}&plc=${model}&address=${address}`;
        if (regType) url += `&regtype=${regType}`;

        fetch(url)
            .then(res => res.json())
            .then(data => data.error ? showError(data.error) : showResults(data))
            .catch(err => showError(err.message));
    });

    function showResults(data) {
        errorSection.style.display = 'none';
        resultsSection.style.display = 'block';

        let html = '';

        if (data.plc_address) {
            html = `
              <div class="output-item">
                <label>PLC Address</label>
                <div class="output-value">${data.plc_address}</div>
              </div>
              <div class="output-item">
                <label>Description</label>
                <div class="output-value">${data.description}</div>
              </div>
            `;
        } else if (data.results) {
            html = data.results.map(r => `
              <div class="output-item">
                <label>${r.addr_type}</label>
                <div class="output-value">${r.plc_address} — ${r.description}</div>
              </div>
            `).join('');
        }

        resultsContent.innerHTML = html;
    }

    function showError(msg) {
        resultsSection.style.display = 'none';
        errorSection.style.display = 'block';
        errorMessage.textContent = msg;
    }
});
</script>
{% endblock %}
